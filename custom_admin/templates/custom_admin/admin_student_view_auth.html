{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Secure Access | Admin Student View</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0ea5e9;
            margin-bottom: 2rem;
            display: block;
        }
        h2 {
            font-size: 1.25rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 0.8rem;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background: #0284c7;
            transform: translateY(-1px);
        }
        .alert {
            padding: 0.8rem;
            background: #fef2f2;
            color: #ef4444;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border: 1px solid #fee2e2;
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            cursor: pointer;
            color: #64748b;
            font-size: 1.2rem;
            user-select: none;
            transition: color 0.2s;
        }
        .password-toggle:hover {
            color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="logo">EduStream</span>
        <h2>Secure Access Confirmation</h2>
        <p>Please enter your admin password to access the Student View.</p>

        {% include 'includes/messages.html' %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Admin Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required placeholder="••••••••" autocapitalize="none" autocorrect="off" spellcheck="false">
                    <span class="password-toggle" onclick="togglePassword()">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn-submit">Verify & Access</button>
        </form>
        
        <a href="{% url 'admin_dashboard' %}" style="display: block; margin-top: 1.5rem; color: #64748b; text-decoration: none; font-size: 0.85rem;">← Back to Dashboard</a>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🔒';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>

{% extends 'custom_admin/base_admin.html' %}

{% block title %}Create Teacher | Admin{% endblock %}

{% block header_title %}
    <h1>Create New Teacher</h1>
    <p style="color: #64748b;">Add a new teacher to the platform manually.</p>
{% endblock %}

{% block content %}
            <div style="background: white; border-radius: 1rem; border: 1px solid #e2e8f0; padding: 2rem; max-width: 600px;">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e293b;">Username</label>
                        <input type="text" name="username" required style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e293b;">Full Name</label>
                        <input type="text" name="fullname" required style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e293b;">Email Address</label>
                        <input type="email" name="email" required style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e293b;">Teacher Proof (PDF)</label>
                        <input type="file" name="proof_file" accept=".pdf" required style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e293b;">Password</label>
                        <input type="password" name="password" required style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>
                    <div style="margin-bottom: 2rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1e293b;">Confirm Password</label>
                        <input type="password" name="confirm_password" required style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;">
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="view-btn" style="background: #6366f1; color: white; border: none; padding: 0.8rem 2rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer;">Create Teacher</button>
                        <a href="{% url 'manage_teachers' %}" class="view-btn" style="background: #f1f5f9; color: #64748b; padding: 0.8rem 2rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600;">Cancel</a>
                    </div>
                </form>
            </div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Admin Login | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>
</head>
<body style="display: flex; align-items: center; justify-content: center; background: #020617;">
    <div class="glass-card" style="width: 100%; max-width: 400px; border-top: 4px solid var(--primary);">
        <h1 style="text-align: center; margin-bottom: 2rem;">Admin Control</h1>
        
        {% include 'includes/messages.html' %}

        <form method="POST" id="loginForm" novalidate>
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Admin Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="password">Admin Password</label>
                <input type="password" name="password" id="password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                <span onclick="togglePassword('password', 'eye-icon-1')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; z-index: 10;">
                    <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 0.5rem;">Admin Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            <a href="{% url 'login' %}" style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none;">Return to User Login</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(username.trim() !== '' && pass.trim() !== '') {
                const btn = document.getElementById('loginBtn');
                btn.innerHTML = 'Verifying... <div class="loader" style="width:16px;height:16px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#fff;animation:spin 1s ease-in-out infinite;"></div>';
                btn.style.opacity = '0.8';
                btn.style.pointerEvents = 'none';
            }
        });
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 1000; position: fixed; width: 280px; transition: transform 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 1rem !important; width: 100%; max-width: 100vw; }
            .search-bar, .form-container, .card, .edit-card, .login-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: 1fr !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages { max-width: 90vw; }
        }
        </style>


    <!-- Mobile Hamburger Toggle -->
    <button id="mobile-sidebar-toggle" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1001; background: #0ea5e9; color: white; width: 50px; height: 50px; border-radius: 50%; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; align-items: center; justify-content: center; font-size: 24px;">
        ☰
    </button>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.getElementById('mobile-sidebar-toggle');
            var sidebars = document.querySelectorAll('.sidebar, aside');
            
            function checkWidth() {
                if (window.innerWidth <= 1024) {
                    if (sidebars.length > 0) {
                        toggleBtn.style.display = 'flex';
                    }
                } else {
                    toggleBtn.style.display = 'none';
                    sidebars.forEach(function(sb) {
                        sb.style.display = '';
                        sb.classList.remove('mobile-active');
                    });
                }
            }
            
            checkWidth();
            window.addEventListener('resize', checkWidth);
            
            toggleBtn.addEventListener('click', function() {
                sidebars.forEach(function(sb) {
                    if (sb.classList.contains('mobile-active')) {
                        sb.classList.remove('mobile-active');
                        sb.style.display = 'none';
                    } else {
                        sb.classList.add('mobile-active');
                        sb.style.display = 'block';
                        sb.style.position = 'fixed';
                        sb.style.zIndex = '1000';
                        sb.style.height = '100vh';
                        sb.style.left = '0';
                        sb.style.top = '0';
                    }
                });
            });
        });
    </script>
    </body>

</html>

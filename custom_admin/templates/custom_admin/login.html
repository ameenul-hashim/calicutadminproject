{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="display: flex; align-items: center; justify-content: center; background: #020617;">
    <div class="glass-card" style="width: 100%; max-width: 400px; border-top: 4px solid var(--primary);">
        <h1 style="text-align: center; margin-bottom: 2rem;">Admin Control</h1>
        
        {% include 'includes/messages.html' %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Admin Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="password">Admin Password</label>
                <input type="password" name="password" id="password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                <span onclick="togglePassword('password', 'eye-icon-1')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; z-index: 10;">
                    <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Admin Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            <a href="{% url 'login' %}" style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none;">Return to User Login</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</body>
</html>

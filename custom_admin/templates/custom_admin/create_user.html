{% extends 'custom_admin/base_admin.html' %}
{% load static %}

{% block title %}create User | Admin{% endblock %}

{% block header_title %}
    <h1>create New User</h1>
{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; background: white; margin: 0 auto;">
    <form method="POST" novalidate>
        {% csrf_token %}
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required>
        </div>
        <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" name="fullname" id="fullname" required>
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
        </div>
        <div class="input-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required>
        </div>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary" style="flex: 1; min-width: 150px;">create User</button>
            <a href="{% url 'admin_dashboard' %}" class="btn" style="background: #f1f5f9; color: #64748b; flex: 1; min-width: 150px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

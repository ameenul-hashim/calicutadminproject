{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Create User | Admin</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>

    <style>
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar, aside { display: none !important; }
            .main-content, main { margin-left: 0 !important; padding: 1rem !important; width: 100% !important; max-width: 100vw !important; }
            .search-bar, .form-container, .card, .edit-card, .login-card, .glass-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid, [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
            [style*="display: flex"] { flex-direction: column !important; }
            header[style*="display: flex"] { flex-direction: column !important; align-items: flex-start !important; gap: 1rem !important; }
            .btn { width: 100% !important; margin-bottom: 0.5rem !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea, input[type="text"], input[type="email"], input[type="password"] { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
            [style*="display: flex"] { flex-direction: row !important; flex-wrap: wrap !important; }
            .btn { width: auto !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages, .alert { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages, .alert { max-width: 90vw; }
        }
    </style>
</head>
<body>
    <div style="display: flex; min-height: 100vh;">
        <!-- Sidebar -->
        <aside style="width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1rem;">
            <h2 style="color: #1e293b; margin-bottom: 2rem; padding: 0 1rem;">Admin Panel</h2>
            <nav>
                <a href="{% url 'admin_dashboard' %}" style="display: block; padding: 0.75rem 1rem; color: #64748b; text-decoration: none; border-radius: 0.5rem; margin-bottom: 0.5rem;">All Users</a>
                <a href="{% url 'pending_users' %}" style="display: block; padding: 0.75rem 1rem; color: #64748b; text-decoration: none; border-radius: 0.5rem; margin-bottom: 0.5rem;">Pending Approvals</a>
                <a href="{% url 'create_user_admin' %}" style="display: block; padding: 0.75rem 1rem; color: #0ea5e9; background: #f1f5f9; text-decoration: none; border-radius: 0.5rem; margin-bottom: 0.5rem; font-weight: 600;">Create User</a>
                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
                    <a href="{% url 'admin_logout' %}" style="display: block; padding: 0.75rem 1rem; color: #ef4444; text-decoration: none;">Logout</a>
                </div>
            </nav>
        </aside>

        <main style="flex: 1; padding: 2rem; max-width: 1140px;">
            <header style="margin-bottom: 2rem;">
                <h1>Create New User</h1>
            </header>

            {% include 'includes/messages.html' %}

            <div class="glass-card" style="max-width: 600px; background: white;">
                <form method="POST" novalidate>
                    {% csrf_token %}
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" name="username" id="username" required>
                    </div>
                    <div class="input-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" name="fullname" id="fullname" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" name="confirm_password" id="confirm_password" required>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn btn-primary">Create User</button>
                        <a href="{% url 'admin_dashboard' %}" class="btn" style="background: #f1f5f9; color: #64748b;">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Mobile Hamburger Toggle -->
    <button id="mobile-sidebar-toggle" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1001; background: #0ea5e9; color: white; width: 50px; height: 50px; border-radius: 50%; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; align-items: center; justify-content: center; font-size: 24px;">
        ☰
    </button>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.getElementById('mobile-sidebar-toggle');
            var sidebars = document.querySelectorAll('.sidebar, aside');
            
            function checkWidth() {
                if (window.innerWidth <= 1024) {
                    if (sidebars.length > 0) {
                        toggleBtn.style.display = 'flex';
                    }
                } else {
                    toggleBtn.style.display = 'none';
                    sidebars.forEach(function(sb) {
                        sb.style.display = '';
                        sb.classList.remove('mobile-active');
                    });
                }
            }
            
            checkWidth();
            window.addEventListener('resize', checkWidth);
            
            toggleBtn.addEventListener('click', function() {
                sidebars.forEach(function(sb) {
                    if (sb.classList.contains('mobile-active')) {
                        sb.classList.remove('mobile-active');
                        sb.style.display = 'none';
                    } else {
                        sb.classList.add('mobile-active');
                        sb.style.display = 'block';
                        sb.style.position = 'fixed';
                        sb.style.zIndex = '1000';
                        sb.style.height = '100vh';
                        sb.style.left = '0';
                        sb.style.top = '0';
                    }
                });
            });
        });
    </script>
    </body>

</html>

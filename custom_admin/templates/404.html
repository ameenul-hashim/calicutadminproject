{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Page Not Found | 404</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #f8fafc;
            padding: 2rem;
        }
        .error-container {
            text-align: center;
            max-width: 560px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-icon { font-size: 4rem; margin-bottom: 1.5rem; }
        h2 { font-size: 1.8rem; margin-bottom: 1rem; font-weight: 700; }
        p { color: #94a3b8; font-size: 1.05rem; line-height: 1.6; margin-bottom: 2.5rem; }
        .btn-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 0.85rem 2rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: #0ea5e9; color: white; }
        .btn-primary:hover { background: #0284c7; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(14,165,233,0.3); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
    
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 1000; position: fixed; width: 280px; transition: transform 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 1rem !important; width: 100%; max-width: 100vw; }
            .search-bar, .form-container, .card, .edit-card, .login-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: 1fr !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages { max-width: 90vw; }
        }
        </style>


    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🔍</div>
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>The page you're looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <div class="btn-row">
            <a href="javascript:history.back()" class="btn btn-secondary">← Go Back</a>
            <a href="/" class="btn btn-primary">Return Home</a>
        </div>
    </div>

    <!-- Mobile Hamburger Toggle -->
    <button id="mobile-sidebar-toggle" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1001; background: #0ea5e9; color: white; width: 50px; height: 50px; border-radius: 50%; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; align-items: center; justify-content: center; font-size: 24px;">
        ☰
    </button>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.getElementById('mobile-sidebar-toggle');
            var sidebars = document.querySelectorAll('.sidebar, aside');
            
            function checkWidth() {
                if (window.innerWidth <= 1024) {
                    if (sidebars.length > 0) {
                        toggleBtn.style.display = 'flex';
                    }
                } else {
                    toggleBtn.style.display = 'none';
                    sidebars.forEach(function(sb) {
                        sb.style.display = '';
                        sb.classList.remove('mobile-active');
                    });
                }
            }
            
            checkWidth();
            window.addEventListener('resize', checkWidth);
            
            toggleBtn.addEventListener('click', function() {
                sidebars.forEach(function(sb) {
                    if (sb.classList.contains('mobile-active')) {
                        sb.classList.remove('mobile-active');
                        sb.style.display = 'none';
                    } else {
                        sb.classList.add('mobile-active');
                        sb.style.display = 'block';
                        sb.style.position = 'fixed';
                        sb.style.zIndex = '1000';
                        sb.style.height = '100vh';
                        sb.style.left = '0';
                        sb.style.top = '0';
                    }
                });
            });
        });
    </script>
    </body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="display: flex; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h1 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" novalidate>
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'signup' %}" style="color: var(--primary); text-decoration: none;">Sign up</a>
        </p>
        <p style="text-align: center; margin-top: 0.5rem;">
            <a href="{% url 'admin_login' %}" style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none;">Admin Access</a>
        </p>
    </div>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Signup | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>

    <style>
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar, aside { display: none !important; }
            .main-content, main { margin-left: 0 !important; padding: 1rem !important; width: 100% !important; max-width: 100vw !important; }
            .search-bar, .form-container, .card, .edit-card, .login-card, .glass-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid, [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
            [style*="display: flex"] { flex-direction: column !important; }
            header[style*="display: flex"] { flex-direction: column !important; align-items: flex-start !important; gap: 1rem !important; }
            .btn { width: 100% !important; margin-bottom: 0.5rem !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea, input[type="text"], input[type="email"], input[type="password"] { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
            [style*="display: flex"] { flex-direction: row !important; flex-wrap: wrap !important; }
            .btn { width: auto !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages, .alert { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages, .alert { max-width: 90vw; }
        }
    </style>
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); padding: 1.5rem; margin: 0;">
    <div class="glass-card" style="width: 100%; max-width: 480px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; font-weight: 800; color: #1e293b; margin: 0;">Join EduStream</h1>
            <p style="color: #64748b; margin-top: 0.5rem;">Create your student account to start learning</p>
        </div>
        
        {% include 'includes/local_messages.html' %}

        <form method="POST" enctype="multipart/form-data" id="signupForm">
            {% csrf_token %}
            <input type="hidden" name="is_mobile" id="is_mobile" value="false">
            <div style="display: grid; grid-template-columns: 1fr; gap: 1.25rem;">
                <div class="input-group">
                    <label for="username" style="font-weight: 600; font-size: 0.9rem; color: #475569;">Username</label>
                    <input type="text" name="username" id="username" value="{{ username|default:'' }}" style="width: 100%; padding: 0.8rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; font-size: 1rem; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#0ea5e9'">
                </div>
                
                <div class="input-group">
                    <label for="fullname" style="font-weight: 600; font-size: 0.9rem; color: #475569;">Full Name</label>
                    <input type="text" name="fullname" id="fullname" value="{{ fullname|default:'' }}" style="width: 100%; padding: 0.8rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; font-size: 1rem; outline: none;" onfocus="this.style.borderColor='#0ea5e9'">
                </div>

                <div class="input-group">
                    <label for="email" style="font-weight: 600; font-size: 0.9rem; color: #475569;">Email Address</label>
                    <input type="email" name="email" id="email" value="{{ email|default:'' }}" style="width: 100%; padding: 0.8rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; font-size: 1rem; outline: none;" onfocus="this.style.borderColor='#0ea5e9'">
                </div>

                <div class="input-group">
                    <label for="phone_number" style="font-weight: 600; font-size: 0.9rem; color: #475569;">Contact Number <span style="font-size: 0.8rem; color: #94a3b8; font-weight: 400;">(10 digits)</span></label>
                    <input type="tel" name="phone_number" id="phone_number" value="{{ phone_number|default:'' }}" placeholder="e.g., 9876543210" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)" style="width: 100%; padding: 0.8rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; font-size: 1rem; outline: none;" onfocus="this.style.borderColor='#0ea5e9'">
                </div>

                <div class="input-group">
                    <label style="font-weight: 600; font-size: 0.9rem; color: #475569; display: block; margin-bottom: 0.5rem;">Verification Document</label>
                    <div class="upload-area" onclick="document.getElementById('proof_file').click()" id="upload-label" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem; padding: 1.25rem; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 0.75rem; cursor: pointer; transition: all 0.2s;">
                        <span id="file-icon" style="font-size: 1.5rem;">📄</span>
                        <div style="text-align: left;">
                            <div id="file-name-display" style="font-weight: 700; font-size: 0.9rem; color: #1e293b;">Click to upload document</div>
                            <div id="upload-help-text" style="font-size: 0.75rem; color: #94a3b8;">PDF Document Only (Max 200KB)</div>
                        </div>
                    </div>
                    <input type="file" name="proof_file" id="proof_file" accept="application/pdf,image/*,.heic,.heif" style="opacity: 0; position: absolute; width: 1px; height: 1px; z-index: -1;" onchange="handleFileSelection(this)">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group" style="position: relative;">
                        <label for="password" style="font-weight: 600; font-size: 0.9rem; color: #475569;">Password</label>
                        <input type="password" name="password" id="password" style="width: 100%; padding: 0.8rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; font-size: 1rem; outline: none; padding-right: 2.5rem;" onfocus="this.style.borderColor='#0ea5e9'">
                        <span onclick="togglePassword('password', 'eye-icon-1')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; color: #94a3b8;">
                            <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap round="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </span>
                    </div>
                    <div class="input-group" style="position: relative;">
                        <label for="confirm_password" style="font-weight: 600; font-size: 0.9rem; color: #475569;">Confirm</label>
                        <input type="password" name="confirm_password" id="confirm_password" style="width: 100%; padding: 0.8rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; font-size: 1rem; outline: none; padding-right: 2.5rem;" onfocus="this.style.borderColor='#0ea5e9'">
                        <span onclick="togglePassword('confirm_password', 'eye-icon-2')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; color: #94a3b8;">
                            <svg id="eye-icon-2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap round="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </span>
                    </div>
                </div>

                <button type="submit" id="signup-btn" style="width: 100%; padding: 1rem; background: #0ea5e9; color: white; border: none; border-radius: 0.75rem; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
                    Create Account
                </button>
            </div>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: #64748b; font-size: 0.95rem;">
            Already have an account? <a href="{% url 'login' %}" style="color: #0ea5e9; text-decoration: none; font-weight: 700;">Login here</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        function handleFileSelection(input) {
            const display = document.getElementById('file-name-display');
            const label = document.getElementById('upload-label');
            const help = document.getElementById('upload-help-text');
            const file = input.files[0];
            const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

            if (file) {
                const fileName = file.name.toLowerCase();
                const allowedImageExts = ['.jpg', '.jpeg', '.png', '.webp', '.heic', '.heif'];
                const isImage = allowedImageExts.some(ext => fileName.endsWith(ext));
                const isPDF = fileName.endsWith('.pdf');

                if (!isPDF && !isImage) {
                    alert("Please upload a PDF or an image (JPG/PNG/HEIC).");
                    input.value = "";
                    resetUploadUI(display, label);
                    return;
                }

                // Conditional limit: 200KB for PDF, 15MB for Images
                let limit;
                if (isPDF) {
                    limit = 200 * 1024; // 200KB
                } else {
                    limit = 15 * 1024 * 1024; // 15MB
                }
                
                if (file.size > limit) {
                    alert("File too large. Maximum size for " + (isPDF ? "PDFs is 200KB." : "Images is 15MB."));
                    input.value = "";
                    resetUploadUI(display, label);
                    return;
                }

                const sizeText = (file.size / 1024 / 1024).toFixed(2) + " MB";
                display.innerText = "Selected: " + (file.name.length > 20 ? file.name.substring(0, 17) + "..." : file.name);
                help.innerText = "Ready to upload (" + sizeText + ")";
                label.style.borderColor = "#10b981";
                label.style.background = "#f0fdf4";
                label.style.color = "#166534";
            }
        }

        function resetUploadUI(display, label) {
            display.innerText = "Click to upload document";
            label.style.borderColor = "#cbd5e1";
            label.style.background = "#f8fafc";
            label.style.color = "#475569";
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const phone = document.getElementById('phone_number').value;
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            const btn = document.getElementById('signup-btn');
            const fileInput = document.getElementById('proof_file');
            const isImage = fileInput.files.length > 0 && !fileInput.files[0].name.toLowerCase().endsWith('.pdf');

            if (phone.length !== 10) { e.preventDefault(); alert("Please enter exactly 10 digits for the contact number."); return; }
            if (pass !== confirmPass) { e.preventDefault(); alert("Passwords do not match!"); return; }

            // If it's an image, force is_mobile=true so the backend converts it to PDF
            if (isImage) {
                document.getElementById('is_mobile').value = "true";
            }

            btn.innerHTML = (isImage ? 'Processing Document...' : 'Creating Account...') + ' <div class="spinner"></div>';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
        });

        window.addEventListener('load', function() {
            const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || window.innerWidth <= 1024;
            const fileInput = document.getElementById('proof_file');
            const helpText = document.getElementById('upload-help-text');
            const mobileInput = document.getElementById('is_mobile');

            fileInput.setAttribute('accept', 'application/pdf,image/*,.heic,.heif');
            if (isTouch) {
                mobileInput.value = "true";
                helpText.innerText = "Upload Photo (Max 15MB) or PDF (Max 200KB)";
            } else {
                mobileInput.value = "false";
                helpText.innerText = "Upload Photo (Max 15MB) or PDF (Max 200KB)";
            }
        });
    </script>
    <style>
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>

</html>

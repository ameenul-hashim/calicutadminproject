{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Signup | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>

    <style>
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar, aside { display: none !important; }
            .main-content, main { margin-left: 0 !important; padding: 1rem !important; width: 100% !important; max-width: 100vw !important; }
            .search-bar, .form-container, .card, .edit-card, .login-card, .glass-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid, [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
            [style*="display: flex"] { flex-direction: column !important; }
            header[style*="display: flex"] { flex-direction: column !important; align-items: flex-start !important; gap: 1rem !important; }
            .btn { width: 100% !important; margin-bottom: 0.5rem !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea, input[type="text"], input[type="email"], input[type="password"] { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
            [style*="display: flex"] { flex-direction: row !important; flex-wrap: wrap !important; }
            .btn { width: auto !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages, .alert { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages, .alert { max-width: 90vw; }
        }
    </style>
</head>
<body style="display: flex; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 450px;">
        <h1 style="text-align: center; margin-bottom: 2rem;">Join E-Learning</h1>
        
        {% include 'includes/local_messages.html' %}

        <form method="POST" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" value="{{ username|default:'' }}" required>
            </div>
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" name="fullname" id="fullname" value="{{ fullname|default:'' }}" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" value="{{ email|default:'' }}" required>
            </div>
            <div class="input-group">
                <label for="phone_number">Contact Number</label>
                <input type="tel" name="phone_number" id="phone_number" value="{{ phone_number|default:'' }}" required placeholder="e.g., +1234567890">
            </div>
            <div class="input-group">
                <label for="proof_file">Student Proof (PDF)</label>
                <input type="file" name="proof_file" id="proof_file" accept=".pdf" required>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                <span onclick="togglePassword('password', 'eye-icon-1')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; z-index: 10;">
                    <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                <span onclick="togglePassword('confirm_password', 'eye-icon-2')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; z-index: 10;">
                    <svg id="eye-icon-2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none;">Login</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>

    <!-- Mobile Hamburger Toggle -->
    <button id="mobile-sidebar-toggle" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1001; background: #0ea5e9; color: white; width: 50px; height: 50px; border-radius: 50%; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; align-items: center; justify-content: center; font-size: 24px;">
        ☰
    </button>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.getElementById('mobile-sidebar-toggle');
            var sidebars = document.querySelectorAll('.sidebar, aside');
            
            function checkWidth() {
                if (window.innerWidth <= 1024) {
                    if (sidebars.length > 0) {
                        toggleBtn.style.display = 'flex';
                    }
                } else {
                    toggleBtn.style.display = 'none';
                    sidebars.forEach(function(sb) {
                        sb.style.display = '';
                        sb.classList.remove('mobile-active');
                    });
                }
            }
            
            checkWidth();
            window.addEventListener('resize', checkWidth);
            
            toggleBtn.addEventListener('click', function() {
                sidebars.forEach(function(sb) {
                    if (sb.classList.contains('mobile-active')) {
                        sb.classList.remove('mobile-active');
                        sb.style.display = 'none';
                    } else {
                        sb.classList.add('mobile-active');
                        sb.style.display = 'block';
                        sb.style.position = 'fixed';
                        sb.style.zIndex = '1000';
                        sb.style.height = '100vh';
                        sb.style.left = '0';
                        sb.style.top = '0';
                    }
                });
            });
        });
    </script>
    </body>

</html>

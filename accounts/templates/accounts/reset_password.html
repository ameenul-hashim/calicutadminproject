{% extends "accounts/base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card animate-fade-in">
        <div class="auth-header">
            <div class="auth-icon success">
                <i class="fas fa-lock-open"></i>
            </div>
            <h2>Update Credentials</h2>
            <p>Verification successful! You can now update your username and password.</p>
        </div>

        <form method="POST" class="auth-form" id="reset-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="new_username">Account Username</label>
                <div class="input-with-icon">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" name="new_username" id="new_username" value="{{ user.username }}" placeholder="Choose a new username (optional)">
                </div>
                <small class="form-hint">You can change your username here if needed.</small>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-key"></i>
                    <input type="password" name="new_password" id="new_password" placeholder="Enter secure password" required>
                </div>
                <div class="password-strength-meter">
                    <div class="meter-bar" id="strength-bar"></div>
                </div>
                <small class="form-hint" id="strength-text">Use 8+ characters with mixed case and symbols.</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-check-double"></i>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Re-enter password" required>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <span>Save & Login</span>
                <i class="fas fa-save"></i>
            </button>
        </form>
    </div>
</div>

<style>
    .password-strength-meter {
        height: 4px;
        background: #e2e8f0;
        border-radius: 2px;
        margin-top: 8px;
        overflow: hidden;
    }
    .meter-bar {
        height: 100%;
        width: 0;
        transition: all 0.3s ease;
    }
    .meter-bar.weak { width: 33%; background: #ef4444; }
    .meter-bar.medium { width: 66%; background: #f59e0b; }
    .meter-bar.strong { width: 100%; background: #10b981; }
    
    .auth-icon.success { background: #ecfdf5; color: #10b981; }
</style>

<script>
    document.getElementById('new_password').addEventListener('input', function() {
        const val = this.value;
        const bar = document.getElementById('strength-bar');
        const text = document.getElementById('strength-text');
        
        let strength = 0;
        if (val.length >= 8) strength++;
        if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
        if (/[@$!%*?&#]/.test(val)) strength++;

        bar.className = 'meter-bar';
        if (val.length === 0) {
            text.textContent = 'Use 8+ characters with mixed case and symbols.';
        } else if (strength === 1) {
            bar.classList.add('weak');
            text.textContent = 'Weak password';
        } else if (strength === 2) {
            bar.classList.add('medium');
            text.textContent = 'Medium strength';
        } else if (strength === 3) {
            bar.classList.add('strong');
            text.textContent = 'Strong password';
        }
    });
</script>
{% endblock %}

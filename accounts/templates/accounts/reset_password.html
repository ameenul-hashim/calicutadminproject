{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Reset Password | EduStream</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0ea5e9;
            text-align: center;
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #475569; font-weight: 600; font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); outline: none; }
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #0284c7; transform: translateY(-1px); }
        .alert { padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .alert-error { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #dcfce7; }
        
        .password-requirements {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #64748b;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 0.5rem;
        }
        .requirement-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
        .requirement-item.valid { color: #16a34a; }
        .requirement-item.invalid { color: #94a3b8; }
    
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 1000; position: fixed; width: 280px; transition: transform 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 1rem !important; width: 100%; max-width: 100vw; }
            .search-bar, .form-container, .card, .edit-card, .login-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: 1fr !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages { max-width: 90vw; }
        }
        </style>


    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>
</head>
<body>
    <div class="auth-card">
        <a href="/" class="logo">EduStream</a>
        <h2 style="text-align: center; margin-bottom: 1rem; color: #1e293b;">Set New Password</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 2rem; font-size: 0.95rem;">Please choose a strong password to secure your account.</p>

        {% include 'includes/messages.html' %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" name="new_password" id="new_password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="password-requirements">
                <div class="requirement-item" id="req-length">○ At least 8 characters</div>
                <div class="requirement-item" id="req-upper">○ One uppercase letter</div>
                <div class="requirement-item" id="req-lower">○ One lowercase letter</div>
                <div class="requirement-item" id="req-special">○ One special character</div>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 1.5rem;">Update Password</button>
        </form>
    </div>

    <script>
        const passwordInput = document.getElementById('new_password');
        const reqLength = document.getElementById('req-length');
        const reqUpper = document.getElementById('req-upper');
        const reqLower = document.getElementById('req-lower');
        const reqSpecial = document.getElementById('req-special');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            
            // Length
            if (val.length >= 8) { reqLength.innerText = '● At least 8 characters'; reqLength.classList.add('valid'); reqLength.classList.remove('invalid'); }
            else { reqLength.innerText = '○ At least 8 characters'; reqLength.classList.remove('valid'); reqLength.classList.add('invalid'); }

            // Upper
            if (/[A-Z]/.test(val)) { reqUpper.innerText = '● One uppercase letter'; reqUpper.classList.add('valid'); reqUpper.classList.remove('invalid'); }
            else { reqUpper.innerText = '○ One uppercase letter'; reqUpper.classList.remove('valid'); reqUpper.classList.add('invalid'); }

            // Lower
            if (/[a-z]/.test(val)) { reqLower.innerText = '● One lowercase letter'; reqLower.classList.add('valid'); reqLower.classList.remove('invalid'); }
            else { reqLower.innerText = '○ One lowercase letter'; reqLower.classList.remove('valid'); reqLower.classList.add('invalid'); }

            // Special
            if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) { reqSpecial.innerText = '● One special character'; reqSpecial.classList.add('valid'); reqSpecial.classList.remove('invalid'); }
            else { reqSpecial.innerText = '○ One special character'; reqSpecial.classList.remove('valid'); reqSpecial.classList.add('invalid'); }
        });
    </script>
</body>

</html>

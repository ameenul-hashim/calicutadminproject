{% extends "accounts/base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card animate-fade-in">
        <div class="auth-header">
            <div class="auth-icon success">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h2>Reset Password</h2>
            <p>create a strong, unique password to secure your account.</p>
        </div>

        <form method="POST" class="auth-form" id="reset-form" novalidate>
            {% include 'includes/validation_engine.html' %}
            {% csrf_token %}
            
            <div class="form-group">
                <label for="new_password">New Password</label>
                <div class="input-with-icon" style="position: relative;">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="new_password" id="new_password" required placeholder="Enter new password" style="padding-right: 45px;">
                    <span onclick="togglePassword('new_password', 'eye-icon-1')" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; display: flex; align-items: center;">
                        <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
                <div class="strength-meter"><div id="strength-bar" class="strength-bar"></div></div>
                <small class="form-hint" id="strength-text">8+ chars, upper, lower & special.</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <div class="input-with-icon" style="position: relative;">
                    <i class="fas fa-check-double"></i>
                    <input type="password" name="confirm_password" id="confirm_password" required placeholder="Re-enter password" style="padding-right: 45px;">
                    <span onclick="togglePassword('confirm_password', 'eye-icon-2')" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; display: flex; align-items: center;">
                        <svg id="eye-icon-2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 1rem;">
                <span>Reset Password</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <script>
            function togglePassword(inputId, iconId) {
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);
                if (input.type === "password") {
                    input.type = "text";
                    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                } else {
                    input.type = "password";
                    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                }
            }

            document.addEventListener('DOMContentLoaded', function() {
                const newPass = document.getElementById('new_password');
                const strengthBar = document.getElementById('strength-bar');
                const strengthText = document.getElementById('strength-text');

                newPass.addEventListener('input', function() {
                    const val = this.value;
                    const score = Validation.password(val);
                    
                    strengthBar.className = 'strength-bar';
                    if (val.length === 0) {
                        strengthText.textContent = '8+ chars, upper, lower & special.';
                    } else if (score <= 2) {
                        strengthBar.classList.add('strength-weak');
                        strengthText.textContent = 'Weak password';
                        strengthText.style.color = '#ef4444';
                    } else if (score === 3) {
                        strengthBar.classList.add('strength-fair');
                        strengthText.textContent = 'Medium strength';
                        strengthText.style.color = '#f59e0b';
                    } else {
                        strengthBar.classList.add('strength-strong');
                        strengthText.textContent = 'Strong password';
                        strengthText.style.color = '#10b981';
                    }
                });

                Validation.initForm('reset-form', {
                    fields: [
                        { id: 'new_password', label: 'New Password', required: true, custom: (val) => {
                            if (val.length < 8) return "Password must be at least 8 characters";
                            if (!/[A-Z]/.test(val)) return "Include at least one uppercase letter";
                            if (!/[a-z]/.test(val)) return "Include at least one lowercase letter";
                            if (!/[@$!%*?&#]/.test(val)) return "Include at least one special character";
                            return null;
                        }},
                        { id: 'confirm_password', label: 'Confirm Password', required: true, custom: (val, form) => {
                            if (val !== form.querySelector('#new_password').value) return "Passwords do not match";
                            return null;
                        }}
                    ]
                });
            });
        </script>
    </div>
</div>

<style>
    .auth-icon.success { background: #f0fdf4; color: #10b981; }
    .strength-meter { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .strength-bar { height: 100%; width: 0; transition: all 0.3s ease; }
    .strength-weak { background: #ef4444; width: 33%; }
    .strength-fair { background: #f59e0b; width: 66%; }
    .strength-strong { background: #10b981; width: 100%; }
    .form-hint { font-size: 0.75rem; transition: color 0.3s; }
</style>
{% endblock %}

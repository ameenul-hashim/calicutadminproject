{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Teacher Signup | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>

    <style>
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar, aside { display: none !important; }
            .main-content, main { margin-left: 0 !important; padding: 1rem !important; width: 100% !important; max-width: 100vw !important; }
            .search-bar, .form-container, .card, .edit-card, .login-card, .glass-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid, [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
            [style*="display: flex"] { flex-direction: column !important; }
            header[style*="display: flex"] { flex-direction: column !important; align-items: flex-start !important; gap: 1rem !important; }
            .btn { width: 100% !important; margin-bottom: 0.5rem !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea, input[type="text"], input[type="email"], input[type="password"] { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
            [style*="display: flex"] { flex-direction: row !important; flex-wrap: wrap !important; }
            .btn { width: auto !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages, .alert { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages, .alert { max-width: 90vw; }
        }
    </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
    <div class="glass-card" style="width: 100%; max-width: 450px; background: white;">
        <h1 style="text-align: center; margin-bottom: 1rem; color: #6366f1;">Teacher Registration</h1>
        <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Join as an educator</p>
        
        {% include 'includes/local_messages.html' %}

        <form method="POST" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" value="{{ username|default:'' }}" required>
            </div>
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" name="fullname" id="fullname" value="{{ fullname|default:'' }}" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" value="{{ email|default:'' }}" required>
            </div>
            <div class="input-group">
                <label for="phone_number">Contact Number <span style="color:#94a3b8;font-size:0.8rem;">(max 10 digits)</span></label>
                <input type="tel" name="phone_number" id="phone_number" value="{{ phone_number|default:'' }}" required placeholder="e.g., 9876543210" maxlength="10" pattern="[0-9]{10}" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)" title="Enter exactly 10 digits">
            </div>
            <div class="input-group" id="proof-upload-wrapper">
                <!-- DESKTOP: Standard PDF upload (shown on lg screens) -->
                <div id="desktop-upload">
                    <label for="proof_file">Teacher Proof (PDF)</label>
                    <input type="file" name="proof_file" id="proof_file" accept=".pdf,.jpg,.jpeg,.png" required style="width:100%;">
                    <p style="font-size:0.78rem;color:#94a3b8;margin-top:0.3rem;">Upload your identity/qualification proof PDF. Max 200KB.</p>
                </div>
                <!-- MOBILE: Camera / Photo upload (shown on mobile only) -->
                <div id="mobile-upload" style="display:none;">
                    <label for="proof_file_mobile" style="display:flex;align-items:center;gap:0.5rem;">
                        📄 Teacher Proof
                        <span style="font-size:0.78rem;background:#ede9fe;color:#7c3aed;padding:0.15rem 0.5rem;border-radius:1rem;">Mobile Upload</span>
                    </label>
                    <div style="display:flex;flex-direction:column;gap:0.75rem;margin-top:0.5rem;">
                        <label style="cursor:pointer;display:flex;align-items:center;gap:0.75rem;padding:0.8rem;background:#f5f3ff;border:2px dashed #a78bfa;border-radius:0.75rem;">
                            <span style="font-size:1.5rem;">📷</span>
                            <div>
                                <div style="font-weight:700;color:#7c3aed;font-size:0.9rem;">Take a Photo of Document</div>
                                <div style="font-size:0.75rem;color:#64748b;">Use camera to capture your certificate/ID</div>
                            </div>
                            <input type="file" name="proof_file" id="proof_file_mobile" accept="image/*,.pdf" capture="environment" style="display:none;" onchange="handleMobileUpload(this)">
                        </label>
                        <label style="cursor:pointer;display:flex;align-items:center;gap:0.75rem;padding:0.8rem;background:#f8fafc;border:2px dashed #cbd5e1;border-radius:0.75rem;">
                            <span style="font-size:1.5rem;">🗂️</span>
                            <div>
                                <div style="font-weight:700;color:#334155;font-size:0.9rem;">Upload from Files / Gallery</div>
                                <div style="font-size:0.75rem;color:#64748b;">PDF, JPG, or PNG — max 200KB</div>
                            </div>
                            <input type="file" name="proof_file" accept="image/*,.pdf" style="display:none;" onchange="handleMobileUpload(this)">
                        </label>
                    </div>
                    <div id="mobile-file-preview" style="display:none;margin-top:0.5rem;padding:0.6rem 1rem;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:0.5rem;color:#166534;font-size:0.85rem;"></div>
                </div>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                <span onclick="togglePassword('password', 'eye-icon-1')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; z-index: 10;">
                    <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                <span onclick="togglePassword('confirm_password', 'eye-icon-2')" style="position: absolute; right: 12px; bottom: 10px; cursor: pointer; z-index: 10;">
                    <svg id="eye-icon-2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; background: #6366f1;">Register as Teacher</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have a teacher account? <a href="{% url 'teacher_login' %}" style="color: #6366f1; text-decoration: none; font-weight: 600;">Teacher Login</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        // Responsive proof upload switcher
        function switchUploadMode() {
            var isMobile = window.innerWidth < 1024;
            var desktop = document.getElementById('desktop-upload');
            var mobile = document.getElementById('mobile-upload');
            var desktopInput = document.getElementById('proof_file');
            
            if (!desktop || !mobile) return;
            
            if (isMobile) {
                desktop.style.display = 'none';
                mobile.style.display = 'block';
                if (desktopInput) desktopInput.required = false;
            } else {
                desktop.style.display = 'block';
                mobile.style.display = 'none';
                if (desktopInput) desktopInput.required = true;
            }
        }

        function handleMobileUpload(input) {
            var preview = document.getElementById('mobile-file-preview');
            if (!preview) return;
            if (input.files && input.files[0]) {
                var file = input.files[0];
                var sizeKB = (file.size / 1024).toFixed(1);
                var icon = file.type.startsWith('image/') ? '🖼️' : '📄';
                preview.style.display = 'block';
                preview.innerHTML = icon + ' <strong>' + file.name + '</strong> (' + sizeKB + ' KB) — ready to upload';
                if (file.size > 200 * 1024) {
                    preview.style.background = '#fef2f2';
                    preview.style.borderColor = '#fecaca';
                    preview.style.color = '#991b1b';
                    preview.innerHTML = '⚠️ File too large (' + sizeKB + ' KB). Maximum allowed is 200KB.';
                }
            }
        }

        // Initialize on load and resize
        window.addEventListener('DOMContentLoaded', switchUploadMode);
        window.addEventListener('resize', switchUploadMode);
    </script>
</body>

</html>

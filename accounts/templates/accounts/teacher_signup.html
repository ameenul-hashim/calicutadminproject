{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Signup | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
    <div class="glass-card" style="width: 100%; max-width: 450px; background: white;">
        <h1 style="text-align: center; margin-bottom: 1rem; color: #6366f1;">Teacher Registration</h1>
        <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Join as an educator</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" name="fullname" id="fullname" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="proof_file">Teacher Proof (PDF)</label>
                <input type="file" name="proof_file" id="proof_file" accept=".pdf" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <div class="input-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; background: #6366f1;">Register as Teacher</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Already have a teacher account? <a href="{% url 'teacher_login' %}" style="color: #6366f1; text-decoration: none; font-weight: 600;">Teacher Login</a>
        </p>
    </div>
</body>
</html>

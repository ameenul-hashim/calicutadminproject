{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduElevate - Premium E-Learning Experience">
    <title>{% block title %}EduElevate{% endblock %}</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-subtle: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-subtle);
            margin: 0;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border: 1px solid #e2e8f0;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-icon {
            width: 64px;
            height: 64px;
            background: #eef2ff;
            color: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }
        .auth-header h2 { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; margin: 0 0 8px; color: #0f172a; }
        .auth-header p { color: #64748b; font-size: 15px; margin: 0; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #475569; }
        .input-with-icon { position: relative; }
        .input-with-icon i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 18px; }
        .input-with-icon input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .input-with-icon input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); outline: none; }
        
        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 25px; border-top: 1px solid #f1f5f9; }
        .auth-footer p { font-size: 14px; color: #64748b; }
        .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }

        .form-hint { font-size: 12px; color: #94a3b8; margin-top: 6px; display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Global Messaging System -->
    {% include 'includes/messages.html' %}

    {% block content %}{% endblock %}

    <!-- Global Footer / Copyright -->
    <footer style="margin-top: auto; padding: 2rem 1rem; text-align: center; background: white; border-top: 1px solid #e2e8f0;">
        <div style="max-width: 480px; margin: 0 auto; padding: 1rem; background: linear-gradient(135deg,rgba(99,102,241,0.05) 0%,rgba(14,165,233,0.05) 100%); border-radius: 1rem; border: 1px solid rgba(99,102,241,0.15);">
            <p style="margin: 0; font-size: 0.8rem; color: #94a3b8; font-weight: 500;">
                &copy; 2026 EduElevate &mdash; Elevating Digital Learning
            </p>
            <p style="margin: 0.4rem 0 0; font-size: 0.8rem; color: #6366f1; font-weight: 700; letter-spacing: 0.03em;">Built &amp; Managed Professionally</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>

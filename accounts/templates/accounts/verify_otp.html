{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Verify OTP | EduStream</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0ea5e9;
            text-align: center;
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #475569; font-weight: 600; font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 0.5rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); outline: none; }
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #0284c7; transform: translateY(-1px); }
        .alert { padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .alert-error { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #dcfce7; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="/" class="logo">EduStream</a>
        <h2 style="text-align: center; margin-bottom: 1rem; color: #1e293b;">Verify OTP</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 2rem; font-size: 0.95rem;">Enter the 6-digit code sent to <strong>{{ email }}</strong></p>

        {% include 'includes/messages.html' %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" name="otp" id="otp" class="form-control" maxlength="6" pattern="\d{6}" placeholder="000000" required autofocus>
            </div>
            <button type="submit" class="btn-primary">Verify OTP</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: #64748b; font-size: 0.9rem;">
            Didn't get the code? <a href="{% url 'forgot_password' %}" style="color: #0ea5e9; text-decoration: none; font-weight: 600;">Resend</a>
        </p>
    </div>
</body>
</html>

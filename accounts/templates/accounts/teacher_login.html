{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream Teacher Login - Access your teaching dashboard.">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Teacher Login | EduStream</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="display: flex; align-items: center; justify-content: center; background: #e0f7fa;">
    <div class="glass-card" style="width: 100%; max-width: 400px; background: white; border-top: 4px solid #6366f1;">
        <h1 style="text-align: center; margin-bottom: 2rem; color: #1e293b;">Teacher Portal</h1>
        
        {% include 'includes/messages.html' %}

        <div class="alert alert-info" style="background: #e0f2fe; border: 1px solid #7dd3fc; color: #0369a1; font-weight: 500; text-align: center; margin-bottom: 1.5rem;">
            Teacher account approval required by administrator.
        </div>

        <form method="POST" novalidate>
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Teacher Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="input-group" style="position: relative;">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                <span onclick="togglePassword('password', 'eye-icon-1')" style="position: absolute; right: 12px; bottom: 35px; cursor: pointer; z-index: 10;">
                    <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="{% url 'forgot_password' %}" style="color: #6366f1; font-size: 0.85rem; text-decoration: none; font-weight: 500;">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; background: #6366f1;">Teacher Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: #64748b;">
            Don't have a teacher account? <a href="{% url 'teacher_signup' %}" style="color: #6366f1; text-decoration: none; font-weight: 600;">Sign up as Teacher</a>
        </p>
        <p style="text-align: center; margin-top: 0.5rem;">
            <a href="{% url 'login' %}" style="color: #64748b; font-size: 0.8rem; text-decoration: none;">Student Login</a>
        </p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</body>
</html>

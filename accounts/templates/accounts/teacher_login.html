{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login | E-Learning</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="display: flex; align-items: center; justify-content: center; background: #f8fafc;">
    <div class="glass-card" style="width: 100%; max-width: 400px; background: white; border-top: 4px solid #6366f1;">
        <h1 style="text-align: center; margin-bottom: 2rem; color: #1e293b;">Teacher Portal</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="alert alert-info" style="background: #e0f2fe; border: 1px solid #7dd3fc; color: #0369a1; font-weight: 500; text-align: center; margin-bottom: 1.5rem;">
            Teacher account approval required by administrator.
        </div>

        <form method="POST" novalidate>
            {% csrf_token %}
            <div class="input-group">
                <label for="username">Teacher Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="{% url 'forgot_password' %}" style="color: #6366f1; font-size: 0.85rem; text-decoration: none; font-weight: 500;">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; background: #6366f1;">Teacher Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: #64748b;">
            Don't have a teacher account? <a href="{% url 'teacher_signup' %}" style="color: #6366f1; text-decoration: none; font-weight: 600;">Sign up as Teacher</a>
        </p>
        <p style="text-align: center; margin-top: 0.5rem;">
            <a href="{% url 'login' %}" style="color: #64748b; font-size: 0.8rem; text-decoration: none;">Student Login</a>
        </p>
    </div>
</body>
</html>

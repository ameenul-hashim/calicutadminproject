<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream | System Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .status-header { padding: 60px 0; background: #fff; border-bottom: 1px solid #eee; }
        .status-badge { font-size: 1.2rem; padding: 12px 30px; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="status-header text-center">
        <div class="container">
            <h1 class="fw-bold mb-4">EduStream Status</h1>
            <div class="d-inline-block shadow-sm">
                <span class="status-badge badge bg-{{ color }} text-white">
                    <i class="fas {% if color == 'success' %}fa-check-circle{% else %}fa-exclamation-triangle{% endif %} me-2"></i>
                    SYSTEM {{ status }}
                </span>
            </div>
            <p class="text-muted mt-4">Last checked: {{ timestamp|date:"H:i:s" }} UTC</p>
        </div>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">System Components</h5>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span><i class="fas fa-database me-2 text-primary"></i>Database Engine</span>
                            <span class="text-success small fw-bold">OPERATIONAL</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span><i class="fas fa-cloud me-2 text-info"></i>Supabase Storage</span>
                            <span class="text-success small fw-bold">OPERATIONAL</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-0">
                            <span><i class="fas fa-video me-2 text-danger"></i>Video CDN</span>
                            <span class="text-success small fw-bold">OPERATIONAL</span>
                        </div>
                    </div>
                </div>

                <div class="alert alert-light border-0 shadow-sm rounded-4 small">
                    <i class="fas fa-info-circle me-2 text-primary"></i>
                    <strong>Scheduled Maintenance:</strong> No maintenance currently scheduled.
                </div>
            </div>
        </div>
    </div>
</body>
</html>

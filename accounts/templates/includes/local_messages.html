{% if messages %}
<div class="local-messages" style="margin-bottom: 1.5rem;">
    {% for message in messages %}
        <div class="local-alert alert-{{ message.tags }}" style="padding: 1rem; border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; 
            {% if message.tags == 'success' %}background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0;
            {% elif message.tags == 'error' %}background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca;
            {% elif message.tags == 'warning' %}background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa;
            {% else %}background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd;{% endif %}">
            <span>
                {% if message.tags == 'success' %}✅ {% elif message.tags == 'error' %}❌ {% elif message.tags == 'warning' %}⚠️ {% else %}ℹ️ {% endif %}
                {{ message }}
            </span>
            <button onclick="this.parentElement.style.display='none'" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; color: currentColor; opacity: 0.7; padding: 0; line-height: 1;">&times;</button>
        </div>
    {% endfor %}
</div>
{% endif %}

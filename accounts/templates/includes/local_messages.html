{% if messages %}
<div class="local-messages" style="margin-bottom: 1.5rem;">
    {% for message in messages %}
        <div class="local-alert alert-{{ message.tags }}" style="padding: 1rem; border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; word-wrap: break-word; word-break: break-word;
            {% if message.tags == 'success' %}background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0;
            {% elif message.tags == 'error' %}background: #fee2e2; color: #b91c1c; border: 1px solid #b91c1c;
            {% elif message.tags == 'warning' %}background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa;
            {% else %}background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd;{% endif %}">
            <span style="flex: 1;">
                {% if message.tags == 'success' %}✅ {% elif message.tags == 'error' %}❌ {% elif message.tags == 'warning' %}⚠️ {% else %}ℹ️ {% endif %}
                {{ message }}
            </span>
            <button onclick="this.parentElement.style.display='none'" style="background: none; border: none; font-size: 1.4rem; cursor: pointer; color: currentColor; opacity: 0.6; padding: 0 0.5rem; line-height: 1; flex-shrink: 0;">&times;</button>
        </div>
    {% endfor %}
</div>
{% endif %}

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduStream - Professional E-Learning Platform for Students, Teachers, and Admins.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Create Assignment | EduStream</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; background: #e0f7fa; margin: 0; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1.5rem; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 2rem 3rem; }
        .form-card { background: white; border-radius: 1.5rem; padding: 2.5rem; border: 1px solid #e2e8f0; max-width: 700px; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        .input-group input, .input-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s; box-sizing: border-box;}
        .input-group input:focus, .input-group textarea:focus { border-color: #6366f1; }
        .file-upload-wrapper { border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 1rem; text-align: center; background: #f8fafc; transition: border-color 0.2s; }
        .file-upload-wrapper:hover { border-color: #6366f1; }
        input[type="file"] { margin-top: 1rem; }
    
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 1000; position: fixed; width: 280px; transition: transform 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 1rem !important; width: 100%; max-width: 100vw; }
            .search-bar, .form-container, .card, .edit-card, .login-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: 1fr !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages { max-width: 90vw; }
        }
        </style>


    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div style="font-size: 1.5rem; font-weight: 800; color: #6366f1; margin-bottom: 3rem;">EduStream</div>
            <nav>
                <a href="{% url 'teacher_dashboard' %}" style="display: block; padding: 0.8rem 1rem; color: #64748b; text-decoration: none; border-radius: 0.75rem; margin-bottom: 0.5rem;">🏠 Dashboard</a>
                <a href="{% url 'course_lessons' course.id %}" style="display: block; padding: 0.8rem 1rem; color: #64748b; text-decoration: none; border-radius: 0.75rem; margin-bottom: 0.5rem;">📚 Manage Content</a>
                <a href="#" style="display: block; padding: 0.8rem 1rem; color: #6366f1; background: #eef2ff; text-decoration: none; border-radius: 0.75rem; font-weight: 600;">📝 Create Assignment</a>
            </nav>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1>Create Assignment for {{ course.title }}</h1>
                <p style="color: #64748b;">Set a new task for your students to complete.</p>
            </header>

            <div class="form-card">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="input-group">
                        <label for="title">Assignment Title</label>
                        <input type="text" name="title" id="title" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="description">Instructions / Description</label>
                        <textarea name="description" id="description" rows="4" required></textarea>
                    </div>

                    <div class="input-group">
                        <label for="deadline">Deadline</label>
                        <input type="datetime-local" name="deadline" id="deadline" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Supporting File (Optional)</label>
                        <div class="file-upload-wrapper">
                            <span style="font-size: 2rem;">📁</span>
                            <p style="color: #64748b; margin: 0.5rem 0 0 0; font-size: 0.9rem;">Attach a PDF or Docx file if needed</p>
                            <input type="file" name="file" accept=".pdf,.doc,.docx,.zip">
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn" style="background: #6366f1; color: white; padding: 0.8rem 2rem; border-radius: 0.75rem; font-weight: 600; border: none; cursor: pointer;">Post Assignment</button>
                        <a href="{% url 'course_lessons' course.id %}" class="btn" style="background: #f1f5f9; color: #64748b; padding: 0.8rem 2rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600;">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>

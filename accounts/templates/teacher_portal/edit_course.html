{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Neo Learner - Think Beyond Learning">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>Edit Course | Neo Learner</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; background: #e0f7fa; margin: 0; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1.5rem; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 2rem 3rem; }
        .form-card { background: white; border-radius: 1.5rem; padding: 2.5rem; border: 1px solid #e2e8f0; max-width: 700px; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 0.8rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .input-group input:focus { border-color: #6366f1; }
    
        /* RESPONSIVE INJECTIONS */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 1000; position: fixed; width: 280px; transition: transform 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 1rem !important; width: 100%; max-width: 100vw; }
            .search-bar, .form-container, .card, .edit-card, .login-card { width: 100% !important; max-width: 100% !important; padding: 1rem !important; }
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: 1fr !important; }
            
            /* Forms */
            .input-group input, .input-group select, .input-group textarea { width: 100% !important; max-width: 100% !important; }
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .stats-grid, .subject-grid, .card-grid, .grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
        .table-responsive, .table-container { overflow-x: auto; width: 100%; }
        table { min-width: 62.5rem; /* 1000px */ }
        
        /* Video Player Responsive */
        .video-container { aspect-ratio: 16 / 9; width: 100%; max-width: 100%; }
        video { width: 100%; height: 100%; }
        
        /* Django Messages Toast */
        .messages { max-width: 24rem; word-wrap: break-word; }
        @media (max-width: 640px) {
            .messages { max-width: 90vw; }
        }
        </style>


    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div style="font-size: 1.5rem; font-weight: 800; color: #6366f1; margin-bottom: 3rem;">Neo Learner</div>
            <nav>
                <a href="{% url 'teacher_dashboard' %}" style="display: block; padding: 0.8rem 1rem; color: #64748b; text-decoration: none; border-radius: 0.75rem; margin-bottom: 0.5rem;">🏠 Dashboard</a>
                <a href="{% url 'my_courses' %}" style="display: block; padding: 0.8rem 1rem; color: #6366f1; background: #eef2ff; text-decoration: none; border-radius: 0.75rem; font-weight: 600;">📚 My Courses</a>
            </nav>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1>Edit Course: {{ course.title }}</h1>
                <p style="color: #64748b;">Update your course details and thumbnail.</p>
            </header>

            <div class="form-card">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="input-group">
                        <label for="title">Course Title</label>
                        <input type="text" name="title" id="title" value="{{ course.title }}" required>
                    </div>
                    <div class="input-group">
                        <label for="description">Course Description</label>
                        <textarea name="description" id="description" rows="4" required>{{ course.description }}</textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="input-group">
                            <label for="category">Category</label>
                            <input type="text" name="category" id="category" value="{{ course.category }}" required>
                        </div>
                        <div class="input-group">
                            <label for="level">Difficulty Level</label>
                            <select name="level" id="level">
                                <option value="BEGINNER" {% if course.level == 'BEGINNER' %}selected{% endif %}>Beginner</option>
                                <option value="INTERMEDIATE" {% if course.level == 'INTERMEDIATE' %}selected{% endif %}>Intermediate</option>
                                <option value="ADVANCED" {% if course.level == 'ADVANCED' %}selected{% endif %}>Advanced</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="imageInput">Course Thumbnail <span style="color:#94a3b8; font-weight:400;">(Leave blank to keep current)</span></label>
                        {% if course.thumbnail_url %}
                        <div style="width:100%; max-width:320px; height:160px; border-radius:0.75rem; overflow:hidden; border:1px solid #e2e8f0; margin-bottom:0.75rem; background:#f8fafc; position:relative;">
                            <img id="previewImg" src="{{ course.thumbnail_url }}" alt="Current Thumbnail" style="width:100%; height:100%; object-fit:cover;">
                            <span style="position:absolute; bottom:0.5rem; left:0.5rem; background:rgba(0,0,0,0.5); color:white; font-size:0.65rem; padding:0.2rem 0.5rem; border-radius:0.25rem;">Current</span>
                        </div>
                        {% else %}
                        <div id="thumbnailPreview" style="display:none; width:100%; max-width:320px; height:160px; border-radius:0.75rem; overflow:hidden; border:1px solid #e2e8f0; margin-bottom:0.75rem; background:#f8fafc;">
                            <img id="previewImg" src="" alt="New Thumbnail" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        {% endif %}
                        <!-- Primary input — always submitted as fallback if JS fails -->
                        <input type="file" id="imageInput" name="thumbnail" accept="image/*" style="display:block; width:100%; padding:0.6rem; border:1px dashed #e2e8f0; border-radius:0.75rem; font-size:0.9rem; cursor:pointer;">
                        <!-- Hidden compressed output — JS replaces name on this and removes name from above -->
                        <input type="file" name="thumbnail_compressed" id="finalThumbnail" style="display:none;">
                        <p id="statusText" style="font-size:0.75rem; color:#94a3b8; margin-top:0.5rem;">
                            * Any size accepted. We'll optimize it automatically.
                        </p>
                    </div>

                    <script>
                        (function() {
                            const imageInput = document.getElementById('imageInput');
                            const finalThumbnail = document.getElementById('finalThumbnail');
                            const statusText = document.getElementById('statusText');
                            const previewImg = document.getElementById('previewImg');
                            const submitBtn = document.querySelector('button[type="submit"]');

                            imageInput.addEventListener('change', function(e) {
                                const file = e.target.files[0];
                                if (!file) return;

                                statusText.innerHTML = `<span style="color:#6366f1;font-weight:600;">⚡ Processing ${file.name} (${(file.size/(1024*1024)).toFixed(2)} MB)...</span>`;
                                if (submitBtn) { submitBtn.disabled = true; submitBtn.innerText = 'Processing...'; }

                                const reader = new FileReader();
                                reader.onload = function(event) {
                                    const img = new Image();
                                    img.onload = function() {
                                        try {
                                            const canvas = document.createElement('canvas');
                                            let width = img.width, height = img.height;
                                            const MAX_SIZE = 1280;
                                            if (width > height) { if (width > MAX_SIZE) { height = Math.round(height * MAX_SIZE / width); width = MAX_SIZE; } }
                                            else { if (height > MAX_SIZE) { width = Math.round(width * MAX_SIZE / height); height = MAX_SIZE; } }
                                            canvas.width = width; canvas.height = height;
                                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                                            // Update preview
                                            if (previewImg) { previewImg.src = canvas.toDataURL('image/jpeg', 0.85); }
                                            const thumbPrev = document.getElementById('thumbnailPreview');
                                            if (thumbPrev) thumbPrev.style.display = 'block';

                                            canvas.toBlob(function(blob) {
                                                try {
                                                    const compressedFile = new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg', lastModified: Date.now() });
                                                    const dt = new DataTransfer();
                                                    dt.items.add(compressedFile);
                                                    finalThumbnail.files = dt.files;
                                                    finalThumbnail.name = 'thumbnail';
                                                    imageInput.removNLtribute('name');
                                                    statusText.innerHTML = `<span style="color:#10b981;font-weight:600;">✅ Optimized! (${(compressedFile.size/1024).toFixed(1)} KB) — Ready to upload</span>`;
                                                } catch(err) {
                                                    statusText.innerHTML = `<span style="color:#f59e0b;font-weight:600;">⚠️ Using original file (${(file.size/1024).toFixed(1)} KB)</span>`;
                                                }
                                                if (submitBtn) { submitBtn.disabled = false; submitBtn.innerText = 'Save Changes'; }
                                            }, 'image/jpeg', 0.85);
                                        } catch(err) {
                                            statusText.innerHTML = `<span style="color:#f59e0b;font-weight:600;">⚠️ Using original file</span>`;
                                            if (submitBtn) { submitBtn.disabled = false; submitBtn.innerText = 'Save Changes'; }
                                        }
                                    };
                                    img.src = event.target.result;
                                };
                                reader.readAsDataURL(file);
                            });
                        })();
                    </script>
                    <div style="display:flex; gap:1rem; margin-top:2rem;">
                        <button type="submit" class="btn" style="background:#6366f1; color:white; padding:0.8rem 2rem; border-radius:0.75rem; font-weight:600; border:none; cursor:pointer;">Save Changes</button>
                        <a href="{% url 'my_courses' %}" class="btn" style="background:#f1f5f9; color:#64748b; padding:0.8rem 2rem; border-radius:0.75rem; text-decoration:none; font-weight:600;">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>

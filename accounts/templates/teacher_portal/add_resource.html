{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course Resource</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false }
      }
    </script>
    <style>
        :root { --sidebar-width: 280px; }
        body { font-family: 'Inter', sans-serif; background: #e0f7fa; margin: 0; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1.5rem; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 2rem 3rem; }
        .form-card { background: white; border-radius: 1.5rem; padding: 2.5rem; border: 1px solid #e2e8f0; width: 100%; min-width: 0; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        .input-group input, .input-group select { width: 100%; padding: 0.8rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .input-group input:focus, .input-group select:focus { border-color: #6366f1; }
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); z-index: 1000; position: fixed; width: 280px; transition: transform 0.3s; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 1rem !important; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div style="font-size: 1.5rem; font-weight: 800; color: #6366f1; margin-bottom: 3rem;">Neo Learner</div>
            <nav>
                <a href="{% url 'teacher_dashboard' %}" style="display: block; padding: 0.8rem 1rem; color: #64748b; text-decoration: none; border-radius: 0.75rem; margin-bottom: 0.5rem;">🏠 Dashboard</a>
                <a href="{% url 'course_lessons' course.uid %}" style="display: block; padding: 0.8rem 1rem; color: #6366f1; background: #eef2ff; text-decoration: none; border-radius: 0.75rem; font-weight: 600;">📚 Manage Content</a>
            </nav>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1>Add Resource to {{ course.title }}</h1>
                <p style="color: #64748b;">Upload PDF study materials for your students (max 10MB).</p>
            </header>

            <div class="form-card">
                <form method="POST" id="resourceForm">
                    {% csrf_token %}
                    <input type="hidden" name="supabase_storage_path" id="supabase_storage_path" value="">
                    <div class="input-group">
                        <label for="title">Resource Title</label>
                        <input type="text" name="title" id="title" required placeholder="e.g. Chapter 1 Notes">
                    </div>

                    <input type="hidden" name="chapter" value="{{ chapter }}">
                    
                    <div class="input-group">
                        <label for="category">Category</label>
                        <select name="category" id="category" required style="cursor: pointer;">
                            <option value="">-- Select Category --</option>
                            <option value="ENGLISH">🇬🇧 English Notes</option>
                            <option value="MALAYALAM">🇮🇳 Malayalam Notes</option>
                            <option value="ONLINE">💻 Online Class Notes</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="upload_file">Upload PDF File</label>
                        <div style="border: 2px dashed #e2e8f0; padding: 2rem; border-radius: 1rem; text-align: center; background: #f8fafc; transition: all 0.2s;" onmouseover="this.style.borderColor='#4f46e5'; this.style.background='#f5f3ff'" onmouseout="this.style.borderColor='#e2e8f0'; this.style.background='#f8fafc'">
                            <input type="file" name="upload_file" id="upload_file" accept=".pdf,application/pdf" required style="width: 100%; cursor: pointer;" onchange="handleFileSelection(this)">
                            <p style="margin-top: 1rem; font-size: 0.8rem; color: #94a3b8;" id="fileHelp">PDF only (Max 10MB)</p>
                            <p style="margin-top: 0.3rem; font-size: 0.75rem; color: #ef4444; display: none;" id="fileError"></p>
                        </div>
                    </div>
                    <script>
                    var uploadInProgress = false;

                    function handleFileSelection(input) {
                        var help = document.getElementById('fileHelp');
                        var err = document.getElementById('fileError');
                        var file = input.files[0];
                        if (!file) { help.style.display = 'block'; err.style.display = 'none'; return; }
                        var ext = file.name.split('.').pop().toLowerCase();
                        if (ext !== 'pdf') {
                            err.textContent = 'Only PDF files are allowed. Please select a PDF file.';
                            err.style.display = 'block';
                            help.style.display = 'none';
                            input.value = '';
                            return;
                        }
                        if (file.size > 10 * 1024 * 1024) {
                            err.textContent = 'File size exceeds the 10MB limit. Please upload a smaller PDF.';
                            err.style.display = 'block';
                            help.style.display = 'none';
                            input.value = '';
                            return;
                        }

                        // Upload to Supabase via signed URL
                        uploadInProgress = true;
                        help.textContent = 'Uploading to storage...';
                        help.style.color = '#d97706';
                        help.style.display = 'block';
                        err.style.display = 'none';

                        fetch('/api/upload/signed-url/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value },
                            body: JSON.stringify({ filename: file.name, file_size: file.size, upload_type: 'resource', course_uid: '{{ course.uid }}' })
                        })
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (!data.signed_url) throw new Error(data.error || 'Failed to get upload URL');
                            return fetch(data.signed_url, {
                                method: 'PUT', body: file, headers: { 'Content-Type': 'application/pdf' }
                            }).then(function() {
                                document.getElementById('supabase_storage_path').value = data.storage_path;
                                uploadInProgress = false;
                                help.textContent = '✓ Uploaded: ' + file.name;
                                help.style.color = '#059669';
                            });
                        })
                        .catch(function(e) {
                            uploadInProgress = false;
                            err.textContent = e.message || 'Upload failed. Please try again.';
                            err.style.display = 'block';
                            help.style.display = 'none';
                            input.value = '';
                        });
                    }

                    document.getElementById('resourceForm').addEventListener('submit', function(e) {
                        if (uploadInProgress) {
                            e.preventDefault();
                            alert('Please wait for the upload to complete.');
                            return;
                        }
                        if (!document.getElementById('supabase_storage_path').value) {
                            e.preventDefault();
                            alert('Please select and upload a PDF file first.');
                            return;
                        }
                    });
                    </script>

                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn" style="background: #4f46e5; color: white; padding: 0.8rem 2rem; border-radius: 0.75rem; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(79,70,229,0.3); flex: 1; transition: all 0.2s;">Upload Resource</button>
                        <a href="{% url 'course_lessons' course.uid %}" class="btn" style="background: #f1f5f9; color: #64748b; padding: 0.8rem 2rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600; flex: 1; text-align: center; border: 1px solid #e2e8f0;">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>

name: Permanent Database Snapshots

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backup Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ameenul-hashim/calicutadminprojectbackupsaving
          persist-credentials: true

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create Full Snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          # -Fc: Custom format (compressed, supports parallel restore)
          pg_dump -Fc "$DATABASE_URL" > "backup_$DATE.dump"

      - name: Commit and Push (Permanent)
        run: |
          git config --global user.name "Backup Bot"
          git config --global user.email "bot@edustream.com"
          git add backup_*.dump
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Permanent Snapshot: $(date +%Y-%m-%d)"
            git push origin main
          fi
